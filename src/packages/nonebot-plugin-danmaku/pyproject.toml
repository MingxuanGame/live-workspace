[project]
name = "nonebot-plugin-danmaku"
version = "0.1.0"
description = "支持命令的弹幕姬"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.13.3",
    "nonebot-adapter-bilibili-live>=0.2.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nonebot_plugin_danmaku"]

[tool.hatch.build.targets.wheel.force-include]
"frontend/dist" = "nonebot_plugin_danmaku/frontend/dist"

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
